<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Roadmap | DevStart
  </title>
  <link href="../style.css" rel="stylesheet"/>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js">
  </script>
 </head>
 <body>
  <div class="app-shell">
   <div data-component="sidebar">
   </div>
   <div class="menu-overlay">
   </div>
   <main class="app-main">
    <div data-component="header">
    </div>
    <section>
     <div class="page-title">
      <div>
       <span class="eyebrow">
        Roadmap personalizado
       </span>
       <h1>
        Crie seu caminho de estudos
       </h1>
       <p class="lead">
        Escolha a &aacute;rea que deseja seguir e gere um caminho inicial com fundamentos, ferramentas, projetos e prepara&ccedil;&atilde;o para vagas.
       </p>
      </div>
     </div>
     <article class="card roadmap-builder">
      <div class="form-grid">
       <div class="field">
        <label>
         &Aacute;rea desejada
        </label>
        <select id="roadmapArea">
         <option value="frontend">
          Front-end
         </option>
         <option value="backend">
          Back-end
         </option>
         <option value="dados">
          Dados
         </option>
         <option value="suporte">
          Suporte T&eacute;cnico
         </option>
         <option value="qa">
          QA/Testes
         </option>
         <option value="uxui">
          UX/UI Design
         </option>
        </select>
       </div>
       <div class="field">
        <label>
         Ritmo de estudo
        </label>
        <select id="roadmapPace">
         <option value="leve">
          Leve &mdash; 30 a 45 min por dia
         </option>
         <option value="medio">
          M&eacute;dio &mdash; 1h por dia
         </option>
         <option value="intenso">
          Intenso &mdash; 2h por dia
         </option>
        </select>
       </div>
      </div>
      <button class="btn btn-primary" id="generateRoadmap" style="margin-top:16px">
       <span class="iconify" data-icon="lucide:sparkles">
       </span>
       Gerar caminho
      </button>
     </article>
     <article class="card" style="margin-top:18px">
      <div class="panel-title">
       <h2 id="roadmapTitle">
        Roadmap Front-end
       </h2>
       <span class="badge" id="roadmapPaceLabel">
        Ritmo leve
       </span>
      </div>
      <div class="roadmap-strip" id="roadmapSteps">
      </div>
     </article>
     <article class="card table-card" style="margin-top:18px">
      <div class="panel-title">
       <h2>
        Plano semanal sugerido
       </h2>
       <span class="badge">
        adapt&aacute;vel
       </span>
      </div>
      <table class="table" id="roadmapTable">
       <tr>
        <th>
         Dia
        </th>
        <th>
         Foco
        </th>
        <th>
         Entrega
        </th>
       </tr>
      </table>
     </article>
    </section>
   </main>
  </div>
  <div aria-hidden="true" class="modal">
  </div>
  <div class="toast">
  </div>
  <script src="../components/sidebar.js">
  </script>
  <script src="../components/header.js">
  </script>
  <script src="../data/courses.js">
  </script>
  <script src="../script.js">
  </script>
 </body>
</html>
