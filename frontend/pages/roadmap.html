<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos | DevStart</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>

<body>
  <div class="app-shell">
    <div data-component="sidebar"></div>
    <div class="menu-overlay"></div>

    <main class="app-main">
      <div data-component="header"></div>

      <section class="page-title">
        <div>
          <p class="eyebrow">PROJETOS PARA PORTFÓLIO</p>
          <h1>Ideias de projetos para praticar e evoluir</h1>
          <p class="lead">
            Filtre por tema, nível e tipo de projeto para encontrar ideias alinhadas ao seu momento na tecnologia.
          </p>
        </div>
      </section>

      <div class="filters">
        <input class="filter" id="projectSearch" type="search" placeholder="Buscar projeto">

        <select class="select" id="projectAreaFilter">
          <option value="all">Todos os temas</option>
          <option value="front-end">Front-end</option>
          <option value="back-end">Back-end</option>
          <option value="full-stack">Full Stack</option>
          <option value="dados">Dados</option>
          <option value="ia">IA</option>
          <option value="mobile">Mobile</option>
        </select>

        <select class="select" id="projectLevelFilter">
          <option value="all">Todos os níveis</option>
          <option value="iniciante">Iniciante</option>
          <option value="intermediario">Intermediário</option>
          <option value="avancado">Avançado</option>
        </select>

        <select class="select" id="projectTypeFilter">
          <option value="all">Todos os tipos</option>
          <option value="landing-page">Landing Page</option>
          <option value="dashboard">Dashboard</option>
          <option value="crud">CRUD</option>
          <option value="api">API</option>
          <option value="automacao">Automação</option>
          <option value="portfolio">Portfólio</option>
        </select>
      </div>

      <section class="content-grid" id="projectsGrid"></section>

      <div id="emptyProjects" class="empty-state hidden">
        Nenhum projeto encontrado com esses filtros.
      </div>
    </main>
  </div>

  <div aria-hidden="true" class="modal">
  </div>

  <div class="toast">
  </div>

  <script src="../components/sidebar.js">
  </script>

  <script src="../components/header.js">
  </script>

  <script src="../script.js">
  </script>
 </body>
</html>
