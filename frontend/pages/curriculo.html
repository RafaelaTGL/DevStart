<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>
    Curr&iacute;culo | Conecta Futuro
  </title>
  <link href="../style.css" rel="stylesheet" />
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js">
  </script>
</head>

<body>
  <div class="app-shell">
    <div data-component="sidebar">
    </div>
    <div class="menu-overlay">
    </div>
    <main class="app-main">
      <div data-component="header">
      </div>
      <section>
<!-- ATS -->
<article class="card ats-upload-card" style="margin-top:18px">
  <div class="ats-header">
    <div>
      <h2>Análise ATS de Currículo </h2>

      <p class="lead">
        Envie seu currículo em PDF ou DOCX e receba uma análise com score,
        pontos fortes, problemas encontrados e sugestões de melhoria.
      </p>
    </div>
  </div>

  <form class="ats-form" enctype="multipart/form-data" id="atsForm">
<label class="upload-box" for="curriculo">
  <span class="iconify" data-icon="lucide:upload-cloud"></span>

  <strong>Enviar currículo</strong>

  <small id="uploadText">
    Clique aqui para selecionar um arquivo PDF ou DOCX
  </small>

  <input
    accept=".pdf,.docx"
    id="curriculo"
    name="curriculo"
    required
    type="file"
  >
</label>

    <div class="field ats-vaga-field">
      <label for="vaga">
        Descrição da vaga desejada
      </label>

      <textarea
        id="vaga"
        name="vaga"
        placeholder="Cole aqui a descrição da vaga, requisitos ou tecnologias pedidas. Esse campo é opcional."
      ></textarea>
    </div>

    <button class="btn btn-primary ats-submit" type="submit">
      <span class="iconify" data-icon="lucide:scan-search"></span>
      Analisar currículo
    </button>
  </form>

  <div class="ats-result" id="resultadoATS"></div>
</article>
      </section>
    </main>
  </div>
  <div aria-hidden="true" class="modal">
  </div>
  <div class="toast">
  </div>
  <script src="../components/sidebar.js">
  </script>
  <script src="../components/header.js">
  </script>
  <script src="../data/courses.js">
  </script>
  <script src="../script.js">
  </script>
</body>

</html>
